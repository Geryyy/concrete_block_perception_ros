world_model_node:
  ros__parameters:
    # ----------------------------------
    # Commissioning mode
    # segment | track | register | full
    # ----------------------------------
    pipeline_mode: "full"
    # BT-facing runtime mode (FULL keeps backward-compatible behavior)
    perception_mode: "IDLE"

    # ----------------------------------
    # World model (minimal)
    # ----------------------------------
    min_points: 50
    world_model:
      object_timeout_s: 10.0
      association_max_distance_m: 0.45
      association_max_age_s: 20.0
      min_update_confidence: 0.25
      refine_target_max_distance_m: 1.2

    # ----------------------------------
    # Registration gating
    # ----------------------------------
    min_fitness: 0.3
    max_rmse: 0.05
    registration:
      # Register only on new/reacquired tracks unless forced
      register_every_frame: false
      min_reregister_s: 2.0
      service_name: "/register_block_pose"

    # ----------------------------------
    # Input synchronization gating
    # ----------------------------------
    sync:
      max_delta_s: 0.06

    # ----------------------------------
    # Runtime debug/perf controls
    # ----------------------------------
    debug:
      publish_detection_overlay: true
      publish_tracking_overlay: true

    perf:
      log_timing: true
      log_every_n_frames: 20

    # ----------------------------------
    # Object / template selection
    # ----------------------------------
    object_class: "concrete_block"

    # ----------------------------------
    # REFINE_GRASPED robust mode (FK + ROI)
    # ----------------------------------
    refine_grasped:
      use_fk_roi: true
      tcp_frame: "elastic/K8_tool_center_point"
      camera_frame: "seyond"
      camera_info_topic: "/zed2i/warped/left/camera_info"
      tcp_to_block:
        xyz: [0.0, 0.0, 0.0]
        rpy: [0.0, 0.0, 0.0]
      roi_size_m: [0.60, 0.40]
      min_depth_m: 0.5
      max_depth_m: 30.0
